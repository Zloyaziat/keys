<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}
.container {
  padding: 20px;
  max-width: 1400px;
  margin: auto;
}
h1 {
  margin-bottom: 20px;
}
.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
button, select, input {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: #e2e8f0;
}
button {
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #2563eb;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 20px;
}
.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 16px;
}
.card h3 {
  margin-top: 0;
  margin-bottom: 15px;
}
.chart-container {
  position: relative;
  height: 300px;
  width: 100%;
}
canvas {
  width: 100% !important;
  height: 100% !important;
}
.filter-group {
  display: flex;
  gap: 5px;
  align-items: center;
}
</style>
</head>
<body>
<div class="container">
<h1>📊 Analytics Dashboard</h1>

<div class="filters">
  <div class="filter-group">
    <label for="date_from">📅 От:</label>
    <input type="date" id="date_from">
  </div>
  <div class="filter-group">
    <label for="date_to">📅 До:</label>
    <input type="date" id="date_to">
  </div>

  <select id="sex">
    <option value="">Все</option>
    <option value="M">Мужчины</option>
    <option value="F">Женщины</option>
  </select>

  <input type="number" id="min_age" placeholder="Возраст от">
  <input type="number" id="max_age" placeholder="Возраст до">

  <input type="text" id="city" placeholder="Город">

  <input type="text" id="category" placeholder="Категория">

  <select id="payment">
    <option value="">Все способы оплаты</option>
    <option value="1">Наличные</option>
    <option value="2">Карта</option>
    <option value="3">QR-код</option>
  </select>

  <button id="refreshBtn">🔄 Применить фильтры</button>
</div>

<div class="grid">
  <!-- 1. Популярные категории у подростков (14-18) -->
  <div class="card">
    <h3>👶 Популярные категории у подростков (14-18)</h3>
    <div class="chart-container">
      <canvas id="ageCategoryChart"></canvas>
    </div>
  </div>

  <!-- 2. Популярные категории у молодежи (18-35) -->
  <div class="card">
    <h3>🧑 Популярные категории у молодежи (18-35)</h3>
    <div class="chart-container">
      <canvas id="ageCategoryChart2"></canvas>
    </div>
  </div>

  <!-- 3. Средний чек по категориям -->
  <div class="card">
    <h3>💰 Средний чек по категориям</h3>
    <div class="chart-container">
      <canvas id="transactionChart"></canvas>
    </div>
  </div>

  <!-- 4. Популярные акции -->
  <div class="card">
    <h3>🎯 Популярные акции</h3>
    <div class="chart-container">
      <canvas id="transactionTypeChart"></canvas>
    </div>
  </div>
  
  <!-- 5. Прогноз транзакций -->
  <div class="card">
    <h3>📈 Прогноз транзакций по категориям</h3>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
  
  <!-- 6. Прогноз по методам оплаты -->
  <div class="card">
    <h3>💳 Прогноз по методам оплаты</h3>
    <div class="chart-container">
      <canvas id="paymentTrendChart"></canvas>
    </div>
  </div>
  
  <!-- 7. Самые популярные категории по городам -->
  <div class="card">
    <h3>🏙️ Самые популярные категории по городам (ТОП-13)</h3>
    <div class="chart-container">
      <canvas id="cityTransactionChart"></canvas>
    </div>
  </div>
</div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
